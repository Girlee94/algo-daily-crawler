name: Daily Crawl & Recommend

on:
  schedule:
    - cron: '0 21 * * *' # UTC 21:00 = KST 06:00
  workflow_dispatch: # 수동 실행 지원

permissions:
  contents: read

jobs:
  crawl-and-recommend:
    runs-on: ubuntu-latest
    concurrency:
      group: daily-crawl-and-recommend
      cancel-in-progress: false
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.13'
          cache: 'pip'
      - run: pip install -e .
      - name: Sync tags
        run: algo-crawler sync-tags
      - name: Crawl problems
        run: algo-crawler crawl --max-pages 5
      - name: Generate recommendations
        run: |
          KST_DATE="$(TZ=Asia/Seoul date +%F)"
          algo-crawler recommend --date "$KST_DATE"
